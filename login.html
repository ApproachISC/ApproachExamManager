<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Approach International Student Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --nd-blue: #0c2340;
    --nd-gold: #ae9142;
    --medium-blue: #143865;
    --bright-blue: #1c4f8f;
    --dark-sky-blue: #c1cddd;
    --medium-sky-blue: #e1e8f2;
    --light-sky-blue: #edf2f9;
    --dark-gold: #8c7535;
    --bright-gold: #d39f10;
    --warm-white: #efe9d9;
    --light-warm-white: #f8f4ec;
    --accent-red: #ab100b;
    --success-green: #3a6b3a;
    --font-display: 'Cormorant Garamond', 'Times New Roman', serif;
    --font-body: 'Montserrat', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--light-warm-white);
    color: var(--nd-blue);
    min-height: 100vh;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
  }
  .brand-bar {
    background: var(--nd-blue);
    color: var(--light-warm-white);
    padding: 0.7rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    border-bottom: 3px solid var(--nd-gold);
  }
  .brand-bar-logo { display: flex; align-items: center; gap: 0.6rem; }
  .brand-monogram {
    font-family: var(--font-display);
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--nd-gold);
    line-height: 1;
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 2rem;
    background:
      radial-gradient(circle at 20% 10%, rgba(174, 145, 66, 0.06) 0%, transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(20, 56, 101, 0.06) 0%, transparent 40%);
  }

  .card {
    max-width: 440px;
    width: 100%;
    background: #fff;
    border-top: 6px solid var(--nd-gold);
    box-shadow: 0 10px 40px rgba(12, 35, 64, 0.08);
    padding: 3rem 2.5rem;
  }

  .institutional-mark {
    text-align: center;
    margin-bottom: 1.5rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--dark-sky-blue);
  }
  .crest {
    display: inline-block;
    width: 56px; height: 56px;
    border: 2px solid var(--nd-blue);
    border-radius: 50%;
    line-height: 52px;
    font-family: var(--font-display);
    font-size: 1.7rem;
    font-weight: 600;
    color: var(--nd-blue);
    margin-bottom: 0.75rem;
    position: relative;
  }
  .crest::after {
    content: '';
    position: absolute; inset: 4px;
    border: 1px solid var(--nd-gold);
    border-radius: 50%;
  }
  .institutional-name {
    font-family: var(--font-display);
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--nd-blue);
    line-height: 1.1;
  }
  .institutional-sub {
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--dark-gold);
    margin-top: 0.4rem;
  }

  h1 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 2.2rem;
    line-height: 1.05;
    text-align: center;
    color: var(--nd-blue);
    margin-bottom: 0.4rem;
  }
  h1 em { font-style: italic; color: var(--nd-gold); font-weight: 500; }
  .subtitle {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 1.05rem;
    color: var(--medium-blue);
    text-align: center;
    margin-bottom: 2rem;
  }

  .field { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.25rem; }
  .field label {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--medium-blue);
  }
  .field input {
    font-family: var(--font-body);
    font-size: 1rem;
    padding: 0.75rem 0.9rem;
    border: 1px solid var(--dark-sky-blue);
    background: var(--light-sky-blue);
    color: var(--nd-blue);
    transition: all 0.2s;
  }
  .field input:focus {
    outline: none;
    border-color: var(--nd-gold);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(174, 145, 66, 0.15);
  }

  .btn-primary {
    font-family: var(--font-body);
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    background: var(--nd-gold);
    color: var(--nd-blue);
    border: none;
    border-bottom: 3px solid var(--nd-blue);
    padding: 1rem 2rem;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    margin-top: 0.5rem;
  }
  .btn-primary:hover:not(:disabled) { background: var(--bright-gold); }
  .btn-primary:disabled {
    background: var(--dark-sky-blue);
    cursor: not-allowed;
    border-bottom-color: var(--medium-blue);
  }

  .alert {
    padding: 0.75rem 1rem;
    margin-bottom: 1.25rem;
    border-left: 3px solid;
    font-size: 0.85rem;
    display: none;
  }
  .alert.show { display: block; }
  .alert.error {
    background: rgba(171, 16, 11, 0.08);
    border-left-color: var(--accent-red);
    color: var(--accent-red);
  }
  .alert.success {
    background: rgba(58, 107, 58, 0.08);
    border-left-color: var(--success-green);
    color: var(--success-green);
  }

  .copyright {
    text-align: center;
    padding: 1.5rem 2rem;
    background: var(--nd-blue);
    color: var(--dark-sky-blue);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    border-top: 2px solid var(--nd-gold);
  }
</style>
</head>
<body>

<div class="brand-bar">
  <div class="brand-bar-logo">
    <span class="brand-monogram">A</span>
    <span>Approach International Student Center</span>
  </div>
  <div>Sign In</div>
</div>

<main>
  <div class="card">
    <div class="institutional-mark">
      <div class="crest">A</div>
      <div class="institutional-name">Approach<span style="color: var(--nd-gold);">USA</span></div>
      <div class="institutional-sub">International Student Center</div>
    </div>

    <h1>Sign <em>In</em></h1>
    <p class="subtitle">Access the examination administration portal</p>

    <div class="alert error" id="errorAlert"></div>
    <div class="alert success" id="successAlert"></div>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary" id="signInBtn">Sign In</button>
    </form>
  </div>
</main>

<div class="copyright">
  Copyright © 2026 Approach International Student Center, Inc. — All rights reserved.
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ============================================
  // CONFIGURE YOUR SUPABASE CREDENTIALS HERE
  // ============================================
  const SUPABASE_URL = 'https://okyauyzdensuvuoyphds.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9reWF1eXpkZW5zdXZ1b3lwaGRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NTgwOTUsImV4cCI6MjA5MzEzNDA5NX0.NZUclCDHecS9bcZOLHj1ZXBFf5b5k9klRwTMfJrglfI';
  // ============================================

  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const errorAlert = document.getElementById('errorAlert');
  const successAlert = document.getElementById('successAlert');
  const signInBtn = document.getElementById('signInBtn');

  function showError(msg) {
    errorAlert.textContent = msg;
    errorAlert.classList.add('show');
    successAlert.classList.remove('show');
  }
  function showSuccess(msg) {
    successAlert.textContent = msg;
    successAlert.classList.add('show');
    errorAlert.classList.remove('show');
  }

  // Redirect to the right place based on role and setup status
  async function redirectByRole(userId) {
    const { data: profile, error } = await db.from('profiles')
      .select('role, is_active, full_name, first_login_at').eq('id', userId).single();

    if (error || !profile) {
      showError('Could not load your profile. Contact the Academic team.');
      await db.auth.signOut();
      return;
    }
    if (!profile.is_active) {
      showError('Your account has been deactivated. Contact the Academic team.');
      await db.auth.signOut();
      return;
    }
    // Incomplete setup — invitee hasn't set their name/password yet
    if (!profile.full_name || !profile.first_login_at) {
      window.location.href = 'setup-account.html';
      return;
    }
    if (profile.role === 'academic') {
      window.location.href = 'admin-dashboard.html';
    } else {
      window.location.href = 'dashboard.html';
    }
  }

  // If already logged in, redirect immediately
  (async () => {
    const { data: { session } } = await db.auth.getSession();
    if (session) await redirectByRole(session.user.id);
  })();

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    signInBtn.disabled = true;
    signInBtn.textContent = 'Signing in…';
    errorAlert.classList.remove('show');

    try {
      const { data, error } = await db.auth.signInWithPassword({ email, password });
      if (error) throw error;
      await redirectByRole(data.user.id);
    } catch (err) {
      showError(err.message || 'Sign-in failed. Please check your credentials.');
      signInBtn.disabled = false;
      signInBtn.textContent = 'Sign In';
    }
  });
</script>

</body>
</html>
