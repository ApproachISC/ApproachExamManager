<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <div class="page" style="max-width: 1200px; width: 100%;">
      <div class="page-header">
        <div>
          <div class="page-stamp">Tools</div>
          <h1>QR Code <em>Generator</em></h1>
        </div>
      </div>

      <div class="qr-container">
        <!-- Left Section: Input -->
        <div class="qr-section">
          <div class="qr-input-card">
            <h2>Input Link</h2>
            <div class="form-field">
              <label for="qrInput">Enter URL or Text</label>
              <textarea id="qrInput" placeholder="Paste your link or text here..."></textarea>
            </div>

            <div class="form-field">
              <label>QR Code Color</label>
              <div class="color-options" id="colorOptions"></div>
              <div class="form-field" style="margin-bottom: 0;">
                <label for="customColor">Or choose a custom color:</label>
                <div class="color-picker-wrapper">
                  <input type="color" id="customColor" class="custom-color-picker" value="#0c2340">
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Right Section: Preview & Actions -->
        <div class="qr-section">
          <div class="qr-preview-card">
            <h2>QR Code Preview</h2>
            <div class="qr-preview-box" id="qrPreviewBox">
              <div class="qr-placeholder">Your QR code will appear here</div>
            </div>
            <div class="qr-actions">
              <button class="qr-btn primary" id="downloadBtn" disabled>
                ⬇ Download
              </button>
              <button class="qr-btn secondary" id="copyBtn" disabled>
                📋 Copy
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    const colors = [
      { name: 'ND Blue', value: '#0c2340' },
      { name: 'ND Gold', value: '#ae9142' },
      { name: 'Medium Blue', value: '#143865' },
      { name: 'Bright Blue', value: '#1c4f8f' },
      { name: 'Dark Gold', value: '#8c7535' },
      { name: 'Bright Gold', value: '#d39f10' },
      { name: 'Accent Red', value: '#ab100b' },
      { name: 'Success Green', value: '#3a6b3a' },
      { name: 'Black', value: '#000000' },
    ];

    let currentColor = '#0c2340';
    let currentQR = null;
    let colorOptionsEl, customColorInput, inputEl, downloadBtn, copyBtn, previewBox;

    function waitForQRCode(callback) {
      if (typeof QRCode !== 'undefined') {
        callback();
      } else {
        setTimeout(() => waitForQRCode(callback), 100);
      }
    }

    function initializeApp() {
      colorOptionsEl = document.getElementById('colorOptions');
      customColorInput = document.getElementById('customColor');
      inputEl = document.getElementById('qrInput');
      downloadBtn = document.getElementById('downloadBtn');
      copyBtn = document.getElementById('copyBtn');
      previewBox = document.getElementById('qrPreviewBox');

      // Initialize color buttons
      colors.forEach((color, index) => {
        const btn = document.createElement('button');
        btn.className = 'color-btn' + (index === 0 ? ' selected' : '');
        btn.style.backgroundColor = color.value;
        btn.title = color.name;
        btn.onclick = () => selectColor(color.value, btn);
        colorOptionsEl.appendChild(btn);
      });

      customColorInput.addEventListener('change', (e) => {
        currentColor = e.target.value;
        updateQR();
        document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('selected'));
      });

      inputEl.addEventListener('input', updateQR);

      downloadBtn.addEventListener('click', () => {
        if (inputEl.value.trim()) {
          const canvas = previewBox.querySelector('canvas');
          if (canvas) {
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = 'qr-code.png';
            link.click();
          }
        }
      });

      copyBtn.addEventListener('click', async () => {
        if (inputEl.value.trim()) {
          const canvas = previewBox.querySelector('canvas');
          if (canvas) {
            try {
              canvas.toBlob((blob) => {
                navigator.clipboard.write([
                  new ClipboardItem({ 'image/png': blob })
                ]).then(() => {
                  showToast('QR code copied to clipboard!', 'success');
                }).catch(err => {
                  showToast('Failed to copy QR code', 'error');
                });
              });
            } catch (err) {
              showToast('Failed to copy QR code', 'error');
            }
          }
        }
      });

      // User menu
      document.getElementById('userMenuTrigger').addEventListener('click', function() {
        document.getElementById('userMenuDropdown').classList.toggle('show');
      });

      document.addEventListener('click', function(event) {
        const menu = document.getElementById('userMenuDropdown');
        const trigger = document.getElementById('userMenuTrigger');
        if (!menu.contains(event.target) && !trigger.contains(event.target)) {
          menu.classList.remove('show');
        }
      });
    }

    function selectColor(color, btn) {
      currentColor = color;
      customColorInput.value = color;
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      updateQR();
    }

    function updateQR() {
      const text = inputEl.value.trim();

      if (!text) {
        previewBox.innerHTML = '<div class="qr-placeholder">Your QR code will appear here</div>';
        downloadBtn.disabled = true;
        copyBtn.disabled = true;
        currentQR = null;
        return;
      }

      previewBox.innerHTML = '';
      downloadBtn.disabled = false;
      copyBtn.disabled = false;

      currentQR = new QRCode(previewBox, {
        text: text,
        width: 256,
        height: 256,
        colorDark: currentColor,
        colorLight: 'transparent',
        correctLevel: QRCode.CorrectLevel.H
      });

      // Make white background transparent and add margins/border-radius
      setTimeout(() => {
        const canvas = previewBox.querySelector('canvas');
        if (canvas) {
          makeTransparent(canvas);
          addMarginsAndRadius(canvas);
        }
      }, 100);
    }

    function makeTransparent(canvas) {
      const ctx = canvas.getContext('2d');
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;

      for (let i = 0; i < data.length; i += 4) {
        const r = data[i];
        const g = data[i + 1];
        const b = data[i + 2];

        // If pixel is white (or very close to white), make it transparent
        if (r > 240 && g > 240 && b > 240) {
          data[i + 3] = 0;
        }
      }

      ctx.putImageData(imageData, 0, 0);
    }

    function addMarginsAndRadius(originalCanvas) {
      const margin = 12;
      const radius = 8;
      const newSize = originalCanvas.width + (margin * 2);

      const newCanvas = document.createElement('canvas');
      newCanvas.width = newSize;
      newCanvas.height = newSize;
      const ctx = newCanvas.getContext('2d');

      // Draw rounded rectangle
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(newSize - radius, 0);
      ctx.quadraticCurveTo(newSize, 0, newSize, radius);
      ctx.lineTo(newSize, newSize - radius);
      ctx.quadraticCurveTo(newSize, newSize, newSize - radius, newSize);
      ctx.lineTo(radius, newSize);
      ctx.quadraticCurveTo(0, newSize, 0, newSize - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.closePath();
      ctx.clip();

      // Draw original canvas onto new canvas with margins
      ctx.drawImage(originalCanvas, margin, margin);

      // Replace original canvas
      originalCanvas.width = newCanvas.width;
      originalCanvas.height = newCanvas.height;
      const originalCtx = originalCanvas.getContext('2d');
      originalCtx.drawImage(newCanvas, 0, 0);
    }

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type} show`;
      toast.textContent = message;
      document.body.appendChild(toast);

      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 2000);
    }

    function logout() {
      window.location.href = 'login.html';
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => {
        waitForQRCode(initializeApp);
      });
    } else {
      waitForQRCode(initializeApp);
    }
  </script>
</body>
</html>
